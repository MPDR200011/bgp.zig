router id 192.168.0.1;

debug protocols all;

log "/tmp/bird_log" all;

protocol bgp {
    local 192.168.0.1 as 65001;

    neighbor 192.168.0.2 as 65002;
    direct;

    ipv4 {
        export all;
        import all;

        next hop self;
    };
}
protocol bgp { #bgpz
    local 192.168.1.1 as 65001;

    neighbor 192.168.1.2 as 65003;
    direct;

    graceful restart off;

    ipv4 {
        export all;
        import all;

        next hop self;
    };
}

protocol static {
    ipv4 {
        import all;
        export none;
    };
    route 10.0.0.0/24 blackhole;
}

protocol device {
    scan time 60;
}
